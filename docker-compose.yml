services:
  mysql-db:
    image: mysql:8.0
    container_name: civic-mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: civic_system
      TZ: UTC
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - civic-network

  backend:
    build:
      context: ./civic-governance-fixed-backend/civic-governance
      dockerfile: Dockerfile
    container_name: civic-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql-db:3306/civic_system?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - civic-network

  frontend:
    image: node:18-alpine
    container_name: civic-frontend
    working_dir: /app
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://13.127.107.63:8080
    volumes:
      - ./civic-governance-fixed-frontend/fixed-frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - civic-network

volumes:
  mysql_data:

networks:
  civic-network:
    driver: bridge
